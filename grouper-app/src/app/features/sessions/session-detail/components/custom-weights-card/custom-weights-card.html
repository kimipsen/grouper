<section class="card section-card">
  <div class="card-content">
    <h2 class="card-heading">{{ 'sessionDetail.customWeights.title' | t }}</h2>

    <div class="weight-editor">
      <div class="form-group">
        <label class="form-label" for="new-weight-name">{{ 'sessionDetail.customWeights.nameLabel' | t }}</label>
        <input id="new-weight-name" class="form-input" [formControl]="newWeightNameControl()" />
      </div>
      <div class="form-group">
        <label class="form-label" for="new-weight-mode">{{ 'sessionDetail.customWeights.modeLabel' | t }}</label>
        <select id="new-weight-mode" class="form-select" [formControl]="newWeightModeControl()">
          <option value="balance">{{ 'sessionDetail.customWeights.modeBalance' | t }}</option>
          <option value="match-similar">{{ 'sessionDetail.customWeights.modeMatchSimilar' | t }}</option>
        </select>
      </div>
      <button class="button button-secondary" type="button" (click)="addWeight.emit()">
        {{ 'sessionDetail.customWeights.add' | t }}
      </button>
    </div>

    <div class="weight-list">
      @for (weight of customWeights(); track weight.id) {
        <div class="weight-row">
          <div class="form-group">
            <label class="form-label" [for]="'weight-name-' + weight.id">{{ 'sessionDetail.customWeights.weightLabel' | t }}</label>
            <input
              #weightNameInput
              [id]="'weight-name-' + weight.id"
              class="form-input"
              [value]="weight.name"
              (input)="renameWeight.emit({ weight, name: weightNameInput.value })" />
          </div>
          <div class="form-group">
            <label class="form-label" [for]="'weight-mode-' + weight.id">{{ 'sessionDetail.customWeights.modeLabel' | t }}</label>
            <select
              #weightModeInput
              [id]="'weight-mode-' + weight.id"
              class="form-select"
              [value]="weight.mode"
              (change)="updateWeightMode.emit({ weight, mode: weightModeInput.value === 'match-similar' ? 'match-similar' : 'balance' })">
              <option value="balance">{{ 'sessionDetail.customWeights.modeBalance' | t }}</option>
              <option value="match-similar">{{ 'sessionDetail.customWeights.modeMatchSimilar' | t }}</option>
            </select>
          </div>
          <button class="button button-unstyled" type="button" (click)="removeWeight.emit(weight)">
            {{ 'common.delete' | t }}
          </button>
        </div>
      }
      @if (customWeights().length === 0) {
        <div class="empty-state">
          <p>{{ 'sessionDetail.customWeights.empty' | t }}</p>
        </div>
      }
    </div>
  </div>
</section>
