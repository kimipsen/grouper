<section class="card section-card">
  <div class="card-content">
    <h2 class="card-heading">{{ 'sessionDetail.peopleTitle' | t:{ count: people().length } }}</h2>

    <div class="people-list">
      @for (person of people(); track person.id) {
        <div class="person-item">
          <button class="person-name" type="button" (click)="openPerson.emit(person)">
            {{ person.name || ('sessionDetail.unnamedPerson' | t) }}
          </button>
          <button class="button button-unstyled" type="button" (click)="removePerson.emit(person)">
            {{ 'common.delete' | t }}
          </button>
        </div>
      }
      @if (people().length === 0) {
        <div class="empty-state">
          <p>{{ 'sessionDetail.noPeople' | t }}</p>
        </div>
      }
    </div>

    <button class="button button-primary add-button" type="button" (click)="addPerson.emit()">
      {{ 'sessionDetail.addPerson' | t }}
    </button>
  </div>
</section>
